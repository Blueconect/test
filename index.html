    margin-bottom:10px;

    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px;
    display:flex;gap:8px;
    box-shadow:0 1px 2px rgba(20,24,28,.05);

  .lookup input{
    flex:1;min-width:0;
    border:none;outline:none;
    font-family:var(--mono);
    font-size:14px;
    padding:10px 8px;
    color:var(--ink);
    background:transparent;
  }
  .lookup input::placeholder{color:#aab2ba}
  .lookup button{
    font-family:var(--sans);font-weight:600;font-size:14px;
    background:var(--ink);color:#fff;
    border:none;border-radius:8px;
    padding:10px 20px;cursor:pointer;
    transition:background .15s;
    white-space:nowrap;
  }
  .lookup button:hover{background:#000}
  .lookup button:disabled{background:#9aa2aa;cursor:wait}
  .lookup input:focus-visible,.lookup button:focus-visible{outline:2px solid var(--btc);outline-offset:2px}
  .hint{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:10px}

  .msg{

  .msg.err{display:block;background:#fcecec;border:1px solid #f0c4c4;color:#8c2f2f}
  .msg.load{display:block;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);font-family:var(--mono);font-size:13px}

  /* ───── relevé / résultat ───── */
  .ticket{
    display:none;
    margin-top:28px;
    background:var(--card);

    box-shadow:0 2px 10px rgba(20,24,28,.06);

<script>
/* ════════════════════════════════════════════════════════════
   Distribution Bitcoin — snapshot 12 juin 2026
   POINTS : [seuil BTC, nb exact d'adresses ≥ seuil]
   TOPBAL : soldes exacts du top 1 000 mondial
   ════════════════════════════════════════════════════════════ */
/* SNAPSHOT_DATE, TOTAL, POINTS, TOPBAL, TOP_FLOOR sont chargés depuis data.js */

const fmtInt = n => new Intl.NumberFormat(locale()).format(Math.round(n));
const fmtBtc = b => {
  if (b >= 1)      return b.toLocaleString(locale(),{maximumFractionDigits:4});
  if (b >= 0.0001) return b.toLocaleString(locale(),{maximumFractionDigits:6});
  return b.toLocaleString(locale(),{maximumFractionDigits:8});
};
const fmtThr = v => v >= 1 ? fmtInt(v) : v.toLocaleString(locale(),{maximumSignificantDigits:3});

/* Tranche fine d'affichage : grille 1 / 1,5 / 2 / 3 / 5 / 7 par décade
   (ex. 12 BTC -> « 10 – 15 BTC », 0,42 BTC -> « 0,3 – 0,5 BTC ») */
function fineBand(btc){
  const STEPS = [1, 1.5, 2, 3, 5, 7, 10];
  const d = Math.floor(Math.log10(btc));
  const p = Math.pow(10, d);
  const m = btc / p;
  let i = 0;
  while (i < STEPS.length-1 && STEPS[i+1] <= m*1.0000001) i++;
  return [STEPS[i]*p, STEPS[i+1]*p];
}

/* Rang : exact dans la zone du top 1000 (recherche binaire),
   sinon interpolation log-log entre points exacts.
   Retourne aussi l'encadrement certain [loRank, hiRank]. */
function estimateRank(btc, addr){
  // 1) zone du top 1000 → rang exact par comparaison de solde.
  //    Tolérance de 0,05 % : les soldes de la liste sont arrondis (ex. 248 598
  //    vs 248 597,59 réel), sinon le n°1 réel ressortirait n°2. Les ex-aequo
  //    de solde (plusieurs adresses identiques) partagent le meilleur rang.
  if (btc >= TOP_FLOOR * 0.9995){
    const tol = Math.max(btc * 0.0005, 0.01);
    let above = 0, equal = 0;
    for (const b of TOPBAL){
      if (b > btc + tol) above++;
      else if (b >= btc - tol) equal++;
    }
    const rank = above + 1;                       // rang partagé en cas d'ex-aequo
    const hiRank = above + Math.max(equal, 1);    // dernière position du groupe
    return { rank, exact: true, inTop: true, loRank: rank, hiRank, tie: equal > 1 };
  }

  // 2) interpolation sur la grille complète (points exacts + points
  //    historiques corrigés de la dérive, drapeau 1)
  if (btc <= 0) return null;
  let i = 0;
  while (i < POINTS.length-1 && POINTS[i+1][0] <= btc) i++;
  const [b1,c1,alpha] = POINTS[i];
  const [b2,c2] = POINTS[Math.min(i+1, POINTS.length-1)];
  let r;
  if (b1 === b2) r = c1;
  else if (alpha != null){
    // loi de Pareto tronquée, calibrée sur le total de BTC réellement détenu dans la tranche
    r = c2 + (c1-c2) * (Math.pow(btc,-alpha) - Math.pow(b2,-alpha)) / (Math.pow(b1,-alpha) - Math.pow(b2,-alpha));
  } else {
    const t = (Math.log(btc)-Math.log(b1)) / (Math.log(b2)-Math.log(b1));
    r = Math.exp(Math.log(c1) + t*(Math.log(c2)-Math.log(c1)));
  }
  // l'encadrement CERTAIN ne s'appuie que sur les comptages exacts du jour
  const EX = POINTS; // tous les points sont exacts
  let j = 0;
  while (j < EX.length-1 && EX[j+1][0] <= btc) j++;
  const [eb1,ec1] = EX[j];
  const [eb2,ec2] = EX[Math.min(j+1, EX.length-1)];
  return { rank: Math.max(1, Math.round(r)), exact: false, inTop: false,
           eb1, eb2, ec1, ec2, loRank: ec2+1, hiRank: ec1 };
}

function looksLikeBtcAddress(a){
  return /^(bc1[a-zA-HJ-NP-Z0-9]{8,87}|[13][a-km-zA-HJ-NP-Z1-9]{25,34})$/.test(a);
}

/* échelle log signature : de 1e-8 à 1e6 BTC */
const LOG_MIN = Math.log10(1e-8), LOG_MAX = Math.log10(1e6);
function positionPct(btc){
  const x = Math.min(Math.max(Math.log10(Math.max(btc,1e-8)), LOG_MIN), LOG_MAX);
  return (x - LOG_MIN) / (LOG_MAX - LOG_MIN) * 100;
}
function buildTicks(){
  const ticksEl = document.getElementById('ticks');
  const marks = [0.0001, 0.01, 1, 100, 10000];
  const labels = ["0,0001","0,01","1 BTC","100","10 000"];
  ticksEl.innerHTML = marks.map((m,i) =>
    `<span class="tick" style="left:${positionPct(m).toFixed(2)}%">${labels[i]}</span>`
  ).join('');
}

let LANG = "en";
try {
  const saved = localStorage.getItem("lang");
  if (saved && I18N[saved]) LANG = saved;
  else { const nav = (navigator.language||"en").slice(0,2); if (I18N[nav]) LANG = nav; }
} catch(e){}

const t = (k, vars) => {
  let s = (I18N[LANG] && I18N[LANG][k]) || I18N.en[k] || k;
  if (vars) for (const [key,v] of Object.entries(vars)) s = s.split("{"+key+"}").join(v);
  return s;
};
const locale = () => LOCALES[LANG] || "en-US";
const snapDateStr = () => {
  if (typeof SNAPSHOT_ISO !== "undefined"){
    const [y,m,d] = SNAPSHOT_ISO.split("-").map(Number);
    return new Date(Date.UTC(y, m-1, d)).toLocaleDateString(locale(), {day:"numeric", month:"long", year:"numeric", timeZone:"UTC"});
  }
  return SNAPSHOT_DATE; // repli si data.js n'a pas encore été régénéré
};

function applyLang(){
  document.documentElement.lang = LANG;
  document.documentElement.style.setProperty("--you", JSON.stringify(t("you")));
  document.title = t("title");
  const compact = new Intl.NumberFormat(locale(), {notation:"compact", maximumFractionDigits:1}).format(TOTAL);
  $("iEyebrow").textContent = t("eyebrow");
  $("iH1").innerHTML = t("h1");
  $("iSub").textContent = t("sub", {n: compact});
  $("addr").placeholder = t("ph");
  $("go").textContent = t("btn");
  $("iHint").textContent = t("hint");
  $("iBadge").textContent = t("badge");
  $("kBal").textContent = t("kBal");
  $("kBracket").textContent = t("kBracket");
  $("kAbove").textContent = t("kAbove");
  $("iLadder").textContent = t("ladder");
  $("iLegL").textContent = t("legL");
  $("iLegR").textContent = t("legR");
  $("iFoot1").innerHTML = t("foot1", {d: snapDateStr()});
  $("iFoot2").textContent = t("foot2");
  document.querySelectorAll("#langs button").forEach(b => b.classList.toggle("on", b.dataset.lang === LANG));
  // si un résultat est affiché, le retraduire
  if ($("ticket").classList.contains("show") && lastResult) renderResult(lastResult);
}

function buildLangBar(){
  $("langs").innerHTML = Object.entries(LANGS).map(([code, flag]) =>
    `<button type="button" data-lang="${code}" aria-label="${code}" title="${code.toUpperCase()}">${flag}</button>`).join("");
  $("langs").addEventListener("click", e => {
    const b = e.target.closest("button[data-lang]");
    if (!b) return;
    LANG = b.dataset.lang;
    try { localStorage.setItem("lang", LANG); } catch(err){}
    applyLang();
  });
}

buildTicks();
buildLangBar();
applyLang();
let lastResult = null;


function renderResult({btc, addr}){
  const est = estimateRank(btc, addr);
  const pct = est.rank / TOTAL * 100;
  const pctStr = (pct < 0.0001 ? 0.0001 : pct).toLocaleString(locale(),
    pct < 1 ? {maximumSignificantDigits:2} : {maximumFractionDigits:1}) + " %";

  $('tAddr').textContent = addr;
  $('tRank').textContent = fmtInt(est.rank);
  $('rankLabel').textContent = est.exact ? t('rankExact') : t('rankEst');
  $('iPct').innerHTML = t('pct', {p: pctStr});
  $('tBtc').innerHTML = fmtBtc(btc) + " <small>BTC</small>";
  $('marker').style.left = positionPct(btc).toFixed(2) + "%";

  if (est.inTop){
    $('tBracket').textContent = t('topBracket');
    $('tAbove').innerHTML = fmtInt(est.rank-1) + " <small>" + t('ofTotal',{n:fmtInt(TOTAL)}) + "</small>";
    $('tFoot').innerHTML = t('footTop', {d: snapDateStr()});
  } else {
    const [blo, bhi] = fineBand(btc);
    $('tBracket').textContent = fmtThr(blo) + " – " + fmtThr(bhi) + " BTC";
    $('tAbove').innerHTML = fmtInt(Math.max(0, est.rank-1)) + " <small>" + t('ofTotal',{n:fmtInt(TOTAL)}) + "</small>";
    const pLo = Math.max(est.loRank, Math.round(est.rank*0.92));
    const pHi = Math.min(est.hiRank, Math.round(est.rank*1.08));
    $('tFoot').innerHTML = t('footEst', {
      a: fmtInt(pLo), b: fmtInt(pHi), c: fmtInt(est.loRank), e: fmtInt(est.hiRank),
      n2: fmtInt(est.ec2), b2: fmtThr(est.eb2), n1: fmtInt(est.ec1), b1: fmtThr(est.eb1)
    });
  }

  $('ticket').classList.add('show');
}

async function check(){
  const addr = $('addr').value.trim();
  const msg = $('msg'), ticket = $('ticket'), btn = $('go');
  ticket.classList.remove('show');
  msg.className = 'msg';

  if (!addr){ msg.className='msg err'; msg.textContent=t('errEmpty'); return; }
  if (!looksLikeBtcAddress(addr)){
    msg.className='msg err';
    msg.textContent=t('errFormat');
    return;
  }

  btn.disabled = true;
  msg.className='msg load';
  msg.textContent=t('loading');

  try{
    let sats, txCount;
    try {
      const aRes = await fetch("https://mempool.space/api/address/" + encodeURIComponent(addr));
      if (aRes.status === 400) throw new Error(t('errInvalid'));
      if (!aRes.ok) throw new Error("http " + aRes.status);
      const a = await aRes.json();
      sats = (a.chain_stats.funded_txo_sum - a.chain_stats.spent_txo_sum)
           + (a.mempool_stats.funded_txo_sum - a.mempool_stats.spent_txo_sum);
      txCount = a.chain_stats.tx_count;
    } catch (e1) {
      if (e1.message === t('errInvalid')) throw e1;
      // repli automatique sur blockchain.info si mempool.space est indisponible
      const bRes = await fetch("https://blockchain.info/rawaddr/" + encodeURIComponent(addr) + "?limit=0&cors=true");
      if (!bRes.ok) throw new Error(bRes.status === 400 ? t('errInvalid') : t('errNet',{c:bRes.status}));
      const b = await bRes.json();
      sats = b.final_balance;
      txCount = b.n_tx;
    }
    const btc = sats / 1e8;

    msg.className='msg';

    if (btc <= 0){
      msg.className='msg err';
      msg.textContent = t('zero') +
        (txCount > 0 ? t('zeroHist',{n:fmtInt(txCount)}) : t('zeroNo'));
      btn.disabled = false;
      return;
    }

    lastResult = { btc, addr };
    renderResult(lastResult);
  }catch(e){
    msg.className='msg err';
    msg.textContent = e.message || t('errFetch');
  }finally{
    btn.disabled = false;
  }
}

$('go').addEventListener('click', check);
$('addr').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
